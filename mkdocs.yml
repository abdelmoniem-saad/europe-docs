site_name: Open-Source Europe
site_description: A semester in Copenhagen, documented like a codebase.
site_url: https://yourusername.github.io/europe-docs/

theme:
  name: material
  palette:
    scheme: slate
    primary: teal
    accent: teal
  font: false
  icon:
    logo: material/earth
    repo: fontawesome/brands/github
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - navigation.expand
    - navigation.path
    - navigation.tracking
    - content.tabs.link
    - content.code.copy
    - content.code.annotate
    - search.suggest
    - search.highlight
    - search.share

plugins:
  - search
  - minify:
      minify_html: true
  - git-revision-date-localized:
      type: timeago
      fallback_to_build_date: true

nav:
  - Home: index.md
  - Prerequisites: prerequisites.md
  - Deployments:
      - Deployments: deployments/index.md
      - Copenhagen: deployments/v0-copenhagen.md
      - Malmö: deployments/v1-malmo.md
      - Lund: deployments/v2-lund.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.snippets:
      check_paths: true
  - pymdownx.magiclink
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.tilde
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

extra_css:
  - stylesheets/extra.css
  - https://unpkg.com/leaflet@1.9.4/dist/leaflet.css

extra_javascript:
  - https://unpkg.com/leaflet@1.9.4/dist/leaflet.js
  - javascripts/maps2.js
  - javascripts/fallback.js
