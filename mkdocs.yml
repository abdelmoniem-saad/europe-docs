site_name: Open-Source Europe
site_description: A semester in Copenhagen, documented like a codebase.
site_url: https://yourusername.github.io/europe-docs/

theme:
  name: material
  palette:
    scheme: slate
    primary: teal
    accent: teal
  font: false
  icon:
    logo: material/earth
    repo: fontawesome/brands/github
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - content.tabs.link
    - content.code.copy
    - search.suggest
    - search.highlight

nav:
  - Home: index.md
  - Prerequisites: prerequisites.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

extra_css:
  - stylesheets/extra.css
  - https://unpkg.com/leaflet@1.9.4/dist/leaflet.css

extra_javascript:
  - https://unpkg.com/leaflet@1.9.4/dist/leaflet.js
  - javascripts/maps.js
